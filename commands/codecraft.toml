description = "Toggle codecraft mode on/off explicitly"
prompt = "Codecraft mode {{args}}. If the argument is 'off' or 'stop', deactivate: stop applying the readability lens automatically from now on. Otherwise (default, or 'on'): activate — apply codecraft principles (obvious over clever, full names, guard clauses, document public contracts, honest error handling) to every function, class, module, or diff you write or refactor from now on, without needing further readability language from the user. Skip it for trivial edits, hot-path perf, urgent hotfixes, and security review."
